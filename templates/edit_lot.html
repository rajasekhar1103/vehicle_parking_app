<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Parking Lot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('admin_dashboard') }}">Admin Panel</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link btn btn-danger text-white" href="{{ url_for('logout') }}">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mt-3">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <h1 class="mb-4">Edit Parking Lot: {{ lot[1] }}</h1>
        <div class="card shadow-sm p-4">
            <form method="post">
                <div class="mb-3">
                    <label for="lotName" class="form-label">Lot Name:</label>
                    <input type="text" class="form-control" id="lotName" name="name" value="{{ lot[1] }}" required>
                </div>
                <div class="mb-3">
                    <label for="pricePerHour" class="form-label">Price per Hour (₹):</label>
                    <input type="number" step="0.01" class="form-control" id="pricePerHour" name="price" value="{{ lot[2] }}" required min="0">
                </div>
                <div class="mb-3">
                    <label for="numSpots" class="form-label">Number of Spots:</label>
                    <input type="number" class="form-control" id="numSpots" name="max_spots" value="{{ lot[3] }}" required min="1">
                </div>
                <div class="mb-3">
                    <label for="address" class="form-label">Address:</label>
                    <input type="text" class="form-control" id="address" name="address" value="{{ lot[4] }}" required>
                </div>
                <div class="mb-3">
                    <label for="pinCode" class="form-label">Pin Code:</label>
                    <input type="text" class="form-control" id="pinCode" name="pin_code" value="{{ lot[5] }}" required pattern="[0-9]{6}" title="Please enter a 6-digit pin code">
                    <small class="form-text text-muted">e.g., 500001 (6 digits)</small>
                </div>
                <div class="mb-3">
                    <label for="city" class="form-label">City:</label>
                    <input type="text" class="form-control" id="city" name="city" value="{{ lot[6] }}" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Update Lot</button>
                <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary w-100 mt-2">Back to Dashboard</a>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='darkmode.js') }}"></script>
</body>
</html>
